<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentbase • Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .elite-card {
            background: #111113;
            border: 1px solid #27272a;
            border-radius: 20px;
        }

        .lead-row {
            transition: background-color 0.1s ease;
        }
        
        .lead-row:hover {
            background-color: #18181b;
        }

        .stage-badge {
            cursor: pointer;
            transition: all 0.1s ease;
        }
        
        .stage-badge:hover {
            filter: brightness(1.1);
        }

        .action-btn {
            opacity: 0.6;
            transition: opacity 0.1s ease;
        }
        
        .lead-row:hover .action-btn {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#0A0A0A] text-zinc-200">
    
    <!-- Top Navigation -->
    <div class="border-b border-zinc-800 bg-[#0A0A0A]/95 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-8">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-robot text-white text-xl"></i>
                    </div>
                    <div>
                        <span class="font-display text-2xl font-semibold tracking-[-1.5px]">Agentbase</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-1 text-sm">
                    <a href="#" class="px-4 py-2 bg-zinc-900 text-white flex items-center gap-x-2 text-sm font-medium rounded-xl">
                        <i class="fa-solid fa-chart-line w-4"></i>
                        <span>Dashboard</span>
                    </a>
                </div>
            </div>

            <div class="flex items-center gap-x-3">
                <div class="text-right">
                    <div class="text-sm font-medium">Luis Palacios</div>
                    <div class="text-[10px] text-zinc-500">Fundador</div>
                </div>
                <div class="w-9 h-9 bg-zinc-800 rounded-2xl flex items-center justify-center text-sm font-semibold border border-zinc-700">LP</div>
            </div>
        </div>
    </div>

    <div class="max-w-screen-2xl mx-auto px-8 py-8">
        
        <!-- Header -->
        <div class="flex items-end justify-between mb-8">
            <div>
                <div class="text-4xl font-semibold tracking-[-2px]">Buenos días, Luis</div>
                <div class="text-zinc-400 mt-1">Aquí tienes el panorama de tu pipeline de Agentbase</div>
            </div>
            
            <div class="flex items-center gap-x-3">
                <button onclick="addLead()" 
                        class="flex items-center gap-x-2 px-5 py-2.5 bg-white text-black text-sm font-semibold rounded-3xl hover:bg-zinc-100 transition-colors">
                    <i class="fa-solid fa-plus mr-2"></i>
                    <span>Nuevo Lead</span>
                </button>
            </div>
        </div>

        <!-- Key Metrics -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8">
            <div class="elite-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs font-medium text-zinc-400">LEADS ACTIVOS</div>
                        <div class="text-4xl font-semibold mt-3 tracking-tighter" id="metric-leads">0</div>
                    </div>
                    <i class="fa-solid fa-users text-emerald-500 text-2xl opacity-70"></i>
                </div>
            </div>
            <div class="elite-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs font-medium text-zinc-400">REUNIONES</div>
                        <div class="text-4xl font-semibold mt-3 tracking-tighter" id="metric-meetings">0</div>
                    </div>
                    <i class="fa-solid fa-calendar-check text-emerald-500 text-2xl opacity-70"></i>
                </div>
            </div>
            <div class="elite-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs font-medium text-zinc-400">CIERRES</div>
                        <div class="text-4xl font-semibold mt-3 tracking-tighter" id="metric-closes">0</div>
                    </div>
                    <i class="fa-solid fa-handshake text-emerald-500 text-2xl opacity-70"></i>
                </div>
            </div>
            <div class="elite-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs font-medium text-zinc-400">TASA CONVERSIÓN</div>
                        <div class="text-4xl font-semibold mt-3 tracking-tighter text-emerald-400" id="metric-conversion">0%</div>
                    </div>
                    <i class="fa-solid fa-chart-line text-emerald-500 text-2xl opacity-70"></i>
                </div>
            </div>
            <div class="elite-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs font-medium text-zinc-400">VALOR PIPELINE</div>
                        <div class="text-3xl font-semibold mt-3 tracking-tighter text-emerald-400" id="metric-revenue">$0</div>
                    </div>
                    <i class="fa-solid fa-dollar-sign text-emerald-500 text-2xl opacity-70"></i>
                </div>
            </div>
            <div class="elite-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs font-medium text-zinc-400">CLIENTES OBJETIVO</div>
                        <div class="text-4xl font-semibold mt-3 tracking-tighter" id="metric-target">10</div>
                        <div class="text-emerald-400 text-xs mt-1">Meta SLP</div>
                    </div>
                    <i class="fa-solid fa-bullseye text-emerald-500 text-2xl opacity-70"></i>
                </div>
            </div>
        </div>

        <!-- Pipeline -->
        <div class="lg:col-span-7">
            <div class="flex items-center justify-between mb-4 px-1">
                <div class="text-xs font-semibold tracking-[0.5px] text-zinc-400">PIPELINE ACTIVO</div>
                <div class="flex items-center gap-x-3">
                    <input id="search-input" type="text" placeholder="Buscar lead..." 
                           class="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-1.5 text-sm w-64 focus:outline-none focus:border-emerald-500">
                </div>
            </div>
            
            <div class="elite-card overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-zinc-800 text-xs text-zinc-400">
                            <th class="text-left py-3 px-6 font-medium">Lead</th>
                            <th class="text-left py-3 px-4 font-medium">Industria</th>
                            <th class="text-left py-3 px-4 font-medium">Etapa</th>
                            <th class="text-right py-3 px-4 font-medium">Valor</th>
                            <th class="text-right py-3 px-6 font-medium w-20">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="pipeline-body" class="text-sm">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Load from localStorage or use default data
        let leads = JSON.parse(localStorage.getItem('agentbase_leads')) || [
            { id: 1, name: "Dr. Roberto Hernández", company: "Clínica Vida", industry: "Clínicas", stage: "Reunión", value: 14990, date: "2026-02-12" },
            { id: 2, name: "María González", company: "Inmobiliaria Norte", industry: "Inmobiliaria", stage: "Propuesta", value: 14990, date: "2026-02-10" },
            { id: 3, name: "Restaurante El Patio", company: "El Patio", industry: "Restaurantes", stage: "Negociación", value: 14990, date: "2026-02-08" },
            { id: 4, name: "Clínica Dental Sonrisa", company: "Sonrisa", industry: "Clínicas", stage: "Cerrado", value: 14990, date: "2026-02-05" },
        ];

        const stages = ["Contactado", "Respondió", "Reunión", "Propuesta", "Negociación", "Cerrado"];

        function saveLeads() {
            localStorage.setItem('agentbase_leads', JSON.stringify(leads));
        }

        function updateMetrics() {
            const total = leads.length;
            const meetings = leads.filter(l => l.stage === "Reunión").length;
            const closes = leads.filter(l => l.stage === "Cerrado").length;
            const conversion = total > 0 ? Math.round((closes / total) * 100) : 0;
            const pipelineValue = leads.reduce((sum, l) => sum + l.value, 0);

            document.getElementById('metric-leads').textContent = total;
            document.getElementById('metric-meetings').textContent = meetings;
            document.getElementById('metric-closes').textContent = closes;
            document.getElementById('metric-conversion').textContent = conversion + "%";
            document.getElementById('metric-revenue').textContent = "$" + (pipelineValue / 1000).toFixed(0) + "k";
        }

        function getStageColor(stage) {
            const colors = {
                'Contactado': 'bg-blue-500/10 text-blue-400',
                'Respondió': 'bg-amber-500/10 text-amber-400',
                'Reunión': 'bg-purple-500/10 text-purple-400',
                'Propuesta': 'bg-orange-500/10 text-orange-400',
                'Negociación': 'bg-pink-500/10 text-pink-400',
                'Cerrado': 'bg-emerald-500/10 text-emerald-400'
            };
            return colors[stage] || 'bg-zinc-700 text-zinc-300';
        }

        function changeStage(id) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;

            const currentIndex = stages.indexOf(lead.stage);
            const nextIndex = (currentIndex + 1) % stages.length;
            
            lead.stage = stages[nextIndex];
            saveLeads();
            renderPipeline();
            updateMetrics();
        }

        function deleteLead(id) {
            if (!confirm("¿Eliminar este lead?")) return;
            leads = leads.filter(l => l.id !== id);
            saveLeads();
            renderPipeline();
            updateMetrics();
        }

        function editLead(id) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;

            const newName = prompt("Nombre del lead:", lead.name);
            if (newName === null) return;

            const newCompany = prompt("Empresa:", lead.company);
            const newIndustry = prompt("Industria:", lead.industry);

            lead.name = newName || lead.name;
            lead.company = newCompany || lead.company;
            lead.industry = newIndustry || lead.industry;

            saveLeads();
            renderPipeline();
        }

        function renderPipeline(filteredLeads = leads) {
            const tbody = document.getElementById('pipeline-body');
            tbody.innerHTML = '';

            filteredLeads.forEach(lead => {
                const row = document.createElement('tr');
                row.className = `lead-row border-b border-zinc-800 last:border-0`;

                row.innerHTML = `
                    <td class="py-4 px-6">
                        <div class="font-medium">${lead.name}</div>
                        <div class="text-xs text-zinc-400">${lead.company}</div>
                    </td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 text-xs rounded-full bg-zinc-800">${lead.industry}</span>
                    </td>
                    <td class="py-4 px-4">
                        <span onclick="changeStage(${lead.id})" 
                              class="stage-badge px-3 py-1 text-xs font-medium rounded-full ${getStageColor(lead.stage)}">
                            ${lead.stage}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-right font-medium">$${lead.value.toLocaleString()}</td>
                    <td class="py-4 px-6 text-right">
                        <div class="flex items-center justify-end gap-x-1">
                            <button onclick="editLead(${lead.id})" class="action-btn text-zinc-400 hover:text-white px-1">
                                <i class="fa-solid fa-edit text-xs"></i>
                            </button>
                            <button onclick="deleteLead(${lead.id})" class="action-btn text-zinc-400 hover:text-red-400 px-1">
                                <i class="fa-solid fa-trash text-xs"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function addLead() {
            const name = prompt("Nombre del lead:");
            if (!name) return;

            const company = prompt("Empresa / Clínica:") || "Sin empresa";
            const industry = prompt("Industria (Clínicas, Restaurantes, Inmobiliaria, etc.):") || "Otro";

            leads.unshift({
                id: Date.now(),
                name: name,
                company: company,
                industry: industry,
                stage: "Contactado",
                value: 14990,
                date: new Date().toISOString().split('T')[0]
            });

            saveLeads();
            renderPipeline();
            updateMetrics();
        }

        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', () => {
                const term = searchInput.value.toLowerCase();
                const filtered = leads.filter(lead => 
                    lead.name.toLowerCase().includes(term) || 
                    lead.company.toLowerCase().includes(term) ||
                    lead.industry.toLowerCase().includes(term)
                );
                renderPipeline(filtered);
            });
        }

        function init() {
            renderPipeline();
            updateMetrics();
            setupSearch();
        }

        window.onload = init;
    </script>
</body>
</html>
