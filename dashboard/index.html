<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentbase • Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.025em; }
        .elite-card { background: #111113; border: 1px solid #27272a; border-radius: 20px; }
        .metric-value { font-size: 32px; line-height: 1; font-weight: 600; }
        .lead-row:hover { background-color: #18181b; }
    </style>
</head>
<body class="bg-[#0A0A0A] text-zinc-200">
    
    <!-- Navbar -->
    <div class="border-b border-zinc-800 bg-[#0A0A0A]/95 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-white text-xl"></i>
                </div>
                <span class="font-display text-2xl font-semibold tracking-[-1.5px]">Agentbase</span>
            </div>
            <div class="flex items-center gap-x-3">
                <div class="flex items-center gap-x-2.5 pl-4 border-l border-zinc-800">
                    <div class="text-sm font-medium">Luis Palacios</div>
                    <div class="w-8 h-8 bg-zinc-800 rounded-2xl flex items-center justify-center text-xs font-semibold border border-zinc-700">LP</div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-screen-2xl mx-auto px-8 py-8">
        
        <!-- Header -->
        <div class="flex items-end justify-between mb-8">
            <div>
                <div class="text-4xl font-semibold tracking-[-2px]">Dashboard</div>
                <div class="text-zinc-400 mt-1">Pipeline de ventas • Agentbase</div>
            </div>
            <button onclick="showAddModal()" 
                    class="px-5 py-2.5 bg-white text-black text-sm font-semibold rounded-3xl flex items-center gap-x-2 hover:bg-zinc-100">
                <i class="fa-solid fa-plus mr-2"></i>
                <span>Nuevo Lead</span>
            </button>
        </div>

        <!-- Metrics -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="elite-card p-6">
                <div class="text-xs text-zinc-400">LEADS ACTIVOS</div>
                <div class="metric-value mt-2" id="kpi-leads">0</div>
            </div>
            <div class="elite-card p-6">
                <div class="text-xs text-zinc-400">REUNIONES</div>
                <div class="metric-value mt-2" id="kpi-meetings">0</div>
            </div>
            <div class="elite-card p-6">
                <div class="text-xs text-zinc-400">CIERRES</div>
                <div class="metric-value mt-2" id="kpi-closes">0</div>
            </div>
            <div class="elite-card p-6">
                <div class="text-xs text-zinc-400">CONVERSIÓN</div>
                <div class="metric-value mt-2 text-emerald-400" id="kpi-conversion">0%</div>
            </div>
            <div class="elite-card p-6">
                <div class="text-xs text-zinc-400">META SLP</div>
                <div class="metric-value mt-2 text-emerald-400">10</div>
            </div>
        </div>

        <!-- Pipeline -->
        <div class="elite-card overflow-hidden">
            <div class="px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
                <div class="font-semibold">Pipeline Activo</div>
                <div class="flex gap-x-2">
                    <input id="search" type="text" placeholder="Buscar lead..." 
                           class="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-1.5 text-sm w-64" onkeyup="filterLeads()">
                    <select id="stage-filter" onchange="filterLeads()" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-1.5 text-sm">
                        <option value="">Todas las etapas</option>
                        <option>Contactado</option><option>Respondió</option><option>Reunión</option>
                        <option>Propuesta</option><option>Negociación</option><option>Cerrado</option>
                    </select>
                </div>
            </div>
            
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-zinc-800 text-xs text-zinc-400">
                        <th class="text-left py-3 px-6">Lead</th>
                        <th class="text-left py-3 px-4">Industria</th>
                        <th class="text-left py-3 px-4">Etapa</th>
                        <th class="text-right py-3 px-6">Valor</th>
                        <th class="text-center py-3 px-4">Acciones</th>
                    </tr>
                </thead>
                <tbody id="leads-table"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="elite-card w-full max-w-md p-6">
            <div class="font-semibold text-lg mb-4">Nuevo Lead</div>
            <div class="space-y-4">
                <div><label class="text-xs text-zinc-400">Nombre completo</label>
                    <input id="lead-name" type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2 mt-1"></div>
                <div><label class="text-xs text-zinc-400">Empresa / Clínica</label>
                    <input id="lead-company" type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2 mt-1"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs text-zinc-400">Industria</label>
                        <select id="lead-industry" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2 mt-1">
                            <option>Clínicas</option><option>Restaurantes</option><option>Inmobiliaria</option><option>Retail</option><option>Otro</option>
                        </select></div>
                    <div><label class="text-xs text-zinc-400">Etapa</label>
                        <select id="lead-stage" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2 mt-1">
                            <option>Contactado</option><option>Respondió</option><option>Reunión</option>
                            <option>Propuesta</option><option>Negociación</option><option>Cerrado</option>
                        </select></div>
                </div>
            </div>
            <div class="flex gap-x-3 mt-6">
                <button onclick="hideModal()" class="flex-1 py-2.5 border border-zinc-700 rounded-2xl text-sm">Cancelar</button>
                <button onclick="saveNewLead()" class="flex-1 py-2.5 bg-white text-black rounded-2xl text-sm font-semibold">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let leads = JSON.parse(localStorage.getItem('agentbase_leads_v2')) || [];

        function saveToStorage() {
            localStorage.setItem('agentbase_leads_v2', JSON.stringify(leads));
        }

        function updateMetrics() {
            const total = leads.length;
            const meetings = leads.filter(l => l.stage === 'Reunión').length;
            const closes = leads.filter(l => l.stage === 'Cerrado').length;
            const conversion = total > 0 ? Math.round((closes / total) * 100) : 0;

            document.getElementById('kpi-leads').textContent = total;
            document.getElementById('kpi-meetings').textContent = meetings;
            document.getElementById('kpi-closes').textContent = closes;
            document.getElementById('kpi-conversion').textContent = conversion + '%';
        }

        function renderLeads(filtered = leads) {
            const tbody = document.getElementById('leads-table');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-zinc-400">No hay leads registrados</td></tr>`;
                return;
            }

            filtered.forEach((lead, index) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-zinc-800 lead-row text-sm';
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-medium">${lead.name}</div>
                        <div class="text-xs text-zinc-400">${lead.company}</div>
                    </td>
                    <td class="px-4 py-4"><span class="px-3 py-1 text-xs rounded-full bg-zinc-800">${lead.industry}</span></td>
                    <td class="px-4 py-4">
                        <select onchange="updateStage(${index}, this.value)" class="bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-1 text-xs">
                            <option ${lead.stage === 'Contactado' ? 'selected' : ''}>Contactado</option>
                            <option ${lead.stage === 'Respondió' ? 'selected' : ''}>Respondió</option>
                            <option ${lead.stage === 'Reunión' ? 'selected' : ''}>Reunión</option>
                            <option ${lead.stage === 'Propuesta' ? 'selected' : ''}>Propuesta</option>
                            <option ${lead.stage === 'Negociación' ? 'selected' : ''}>Negociación</option>
                            <option ${lead.stage === 'Cerrado' ? 'selected' : ''}>Cerrado</option>
                        </select>
                    </td>
                    <td class="px-6 py-4 text-right font-medium">$${lead.value}</td>
                    <td class="px-4 py-4 text-center">
                        <button onclick="deleteLead(${index})" class="text-zinc-400 hover:text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterLeads() {
            const search = document.getElementById('search').value.toLowerCase();
            const stage = document.getElementById('stage-filter').value;

            const filtered = leads.filter(l => {
                const matchSearch = l.name.toLowerCase().includes(search) || l.company.toLowerCase().includes(search);
                const matchStage = !stage || l.stage === stage;
                return matchSearch && matchStage;
            });
            renderLeads(filtered);
        }

        function updateStage(index, newStage) {
            leads[index].stage = newStage;
            saveToStorage();
            updateMetrics();
            renderLeads();
        }

        function deleteLead(index) {
            if (confirm('¿Eliminar este lead?')) {
                leads.splice(index, 1);
                saveToStorage();
                updateMetrics();
                renderLeads();
            }
        }

        function showAddModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        function saveNewLead() {
            const name = document.getElementById('lead-name').value.trim();
            const company = document.getElementById('lead-company').value.trim();
            const industry = document.getElementById('lead-industry').value;
            const stage = document.getElementById('lead-stage').value;

            if (!name || !company) {
                alert('Nombre y empresa son obligatorios');
                return;
            }

            leads.unshift({
                id: Date.now(),
                name,
                company,
                industry,
                stage,
                value: 14990
            });

            saveToStorage();
            updateMetrics();
            renderLeads();
            hideModal();

            // Limpiar formulario
            document.getElementById('lead-name').value = '';
            document.getElementById('lead-company').value = '';
        }

        function init() {
            renderLeads();
            updateMetrics();
        }

        window.onload = init;
    </script>
</body>
</html>
